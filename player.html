<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Karaoke Player</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="player">
    <main class="app-shell player-shell">
      <section class="surface player-surface" aria-label="Karaoke player">
        <header class="player-header">
          <a class="back-link" href="index.html" aria-label="返回歌曲列表">返回列表</a>
          <div class="song-heading">
            <p class="eyebrow">Now Playing</p>
            <h1 id="songTitle">加载中...</h1>
            <p id="songArtist" class="subtle">准备开始</p>
          </div>
        </header>

        <section class="lyrics-panel" aria-live="polite" aria-label="歌词">
          <ol id="lyricsList" class="lyrics-list"></ol>
        </section>

        <footer class="player-bar" aria-label="播放控制">
          <audio id="audioPlayer" preload="metadata"></audio>

          <div class="timeline-row">
            <span id="currentTime">0:00</span>
            <input id="seekBar" class="seek-bar" type="range" min="0" max="0" step="0.1" value="0" aria-label="播放进度">
            <span id="duration">0:00</span>
          </div>

          <div class="controls-row">
            <button id="previousButton" class="control-button" type="button" aria-label="上一首">上一首</button>
            <button id="rewindButton" class="control-button" type="button" aria-label="后退 5 秒">-5s</button>
            <button id="playPauseButton" class="primary-control" type="button" aria-label="播放">播放</button>
            <button id="forwardButton" class="control-button" type="button" aria-label="前进 5 秒">+5s</button>
            <button id="nextButton" class="control-button" type="button" aria-label="下一首">下一首</button>
          </div>

          <div class="secondary-row">
            <button id="repeatLineButton" type="button">重唱本句</button>
            <select id="songSelect" aria-label="切换歌曲"></select>
          </div>
        </footer>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
